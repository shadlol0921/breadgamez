<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BreadGamez - Unblocked Games</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
}

header {
    background: #1f1f1f;
    padding: 15px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
}

#search {
    width: 80%;
    padding: 10px;
    margin: 20px auto;
    display: block;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

.games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

.game-card {
    background: #1f1f1f;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    text-align: center;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

.game-card:hover {
    background: #333;
    transform: scale(1.05);
}
</style>
</head>

<body>

<header>🎮 BreadGamez - Unblocked Games</header>

<input type="text" id="search" placeholder="Search games on BreadGamez..." onkeyup="searchGames()">

<div class="games" id="gameList">

    <a href="https://www.crazygames.com/game/slope" target="_blank" class="game-card">Slope</a>
    <a href="https://www.crazygames.com/game/run-3" target="_blank" class="game-card">Run 3</a>
    <a href="https://www.crazygames.com/game/moto-x3m" target="_blank" class="game-card">Moto X3M</a>
    <!-- Add more games below -->
    
</div>

<script>
function searchGames() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.getElementsByClassName("game-card");

    for (let i = 0; i < cards.length; i++) {
        let title = cards[i].innerText.toLowerCase();
        cards[i].style.display = title.includes(input) ? "block" : "none";
    }
}
</script>

</body>
</html>
